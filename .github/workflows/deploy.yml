name: Deploy to Main

env:
  PROJECT_ID: duxca-298210
  PROJECT_NUMBER: 93254674393
  POOL_ID: githubaction
  PROVIDER_ID: github
  SERVICE_ACCOUNT: github-action-river@duxca-298210.iam.gserviceaccount.com
  IMAGE_REPOSITORY: asia-northeast1-docker.pkg.dev/duxca-298210/cloud-run-source-deploy/litestream-sandbox
  IMAGE_TAG: latest
  CARGO_TERM_COLOR: always

on:
  pull_request:
    branches: [ "main" ]
    types: [ "closed" ]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:

  test:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}
    - uses: dtolnay/rust-toolchain@1.96.0
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
    - uses: cargo-bins/cargo-binstall@v1.20.0
    - name: Install cargo-leptos
      run: |
        cargo binstall -y --force cargo-leptos@0.3.6 sqlx-cli@0.8.6
        cargo leptos --version
        cargo sqlx --version
    - run: make test
    - run: make test-e2e

  deploy:
    if: github.event.pull_request.merged == true
    needs: [ test ]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}
    - uses: dtolnay/rust-toolchain@1.96.0
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: deploy-release
    - uses: cargo-bins/cargo-binstall@v1.20.0
    - name: Install cargo-leptos
      run: |
        cargo binstall -y --force cargo-leptos@0.3.6 sqlx-cli@0.8.6
        cargo leptos --version
        cargo sqlx --version
    - name: Build release artifacts
      run: |
        set -euo pipefail
        make build
        rm -rf .docker-build
        mkdir -p .docker-build
        cp target/release/server .docker-build/server
        cp -a target/site .docker-build/site
    - uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.POOL_ID }}/providers/${{ env.PROVIDER_ID }}
        project_id: ${{ env.PROJECT_ID }}
        service_account: ${{ env.SERVICE_ACCOUNT }}
    - uses: google-github-actions/setup-gcloud@v3
    - run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev
    - uses: docker/setup-buildx-action@v4
    - name: Build and push image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Resolve pushed image digest
      id: image
      run: |
        set -euo pipefail
        image="${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}"
        echo "image=${image}" >> "${GITHUB_OUTPUT}"
        echo "Pushed ${image}"
    - uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: 1.15.5
    - name: Terraform Init and Apply
      working-directory: ./terraform
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CONTAINER_IMAGE: ${{ steps.image.outputs.image }}
      run: |
        set -euo pipefail
        terraform init
        terraform plan -out=tfplan -var="container_image=${CONTAINER_IMAGE}"
        terraform apply -auto-approve tfplan
    - name: Output Service URL
      working-directory: ./terraform
      run: |
        echo "✅ デプロイが完了しました！"
        echo "🌐 サービスURL: $(terraform output -raw cloud_run_url)"
