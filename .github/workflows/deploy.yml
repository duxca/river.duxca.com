name: Deploy to Main

env:
  PROJECT_ID: river-duxca-prod
  PROJECT_NUMBER: 521139256632
  POOL_ID: githubaction
  PROVIDER_ID: github
  SERVICE_ACCOUNT: github-action-river@river-duxca-prod.iam.gserviceaccount.com
  IMAGE_REPOSITORY: asia-northeast1-docker.pkg.dev/river-duxca-prod/cloud-run-source-deploy/litestream-sandbox
  IMAGE_TAG: latest
  CARGO_TERM_COLOR: always
  RUST_CACHE_SHARED_KEY: rust-1.96.0

on:
  pull_request:
    branches: [ "main" ]
    types: [ "closed" ]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:

  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}
    - uses: dtolnay/rust-toolchain@1.96.0
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
    - uses: cargo-bins/cargo-binstall@v1.20.0
    - name: Install cargo-leptos and sqlx-cli
      run: |
        cargo leptos --version >/dev/null 2>&1 || cargo binstall -y cargo-leptos@0.3.6
        cargo sqlx --version >/dev/null 2>&1 || cargo binstall -y sqlx-cli@0.8.6
        cargo leptos --version
        cargo sqlx --version
    - name: Run unit tests
      run: make test
    - name: Run browser scenario tests
      run: make test-e2e
    - uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.POOL_ID }}/providers/${{ env.PROVIDER_ID }}
        project_id: ${{ env.PROJECT_ID }}
        service_account: ${{ env.SERVICE_ACCOUNT }}
    - uses: google-github-actions/setup-gcloud@v3
    - uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: 1.15.5
        terraform_wrapper: false
    - name: Terraform Apply GCP Storage
      working-directory: ./terraform_gcp_storage
      run: |
        set -euo pipefail
        timeout 5m terraform init
        timeout 10m terraform plan -out=tfplan -var-file=prod.tfvars
        timeout 20m terraform apply -auto-approve tfplan
    - run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev
    - uses: docker/setup-buildx-action@v4
    - name: Build and push image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
        cache-from: type=gha,scope=runtime-image
        cache-to: type=gha,mode=max,scope=runtime-image
    - name: Resolve pushed image digest
      id: image
      run: |
        set -euo pipefail
        image="${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}"
        echo "image=${image}" >> "${GITHUB_OUTPUT}"
        echo "Pushed ${image}"
    - name: Verify Secret Manager versions
      run: |
        set -euo pipefail
        gcloud secrets versions access 2 \
          --project="${PROJECT_ID}" \
          --secret=FACEBOOK_CLIENT_SECRET >/dev/null
        gcloud secrets versions access 2 \
          --project="${PROJECT_ID}" \
          --secret=GITHUB_CLIENT_SECRET >/dev/null
    - name: Terraform Apply GCP App
      working-directory: ./terraform_gcp_app
      env:
        CONTAINER_IMAGE: ${{ steps.image.outputs.image }}
      run: |
        set -euo pipefail
        timeout 5m terraform init
        timeout 10m terraform plan -out=tfplan -var-file=prod.tfvars -var="container_image=${CONTAINER_IMAGE}"
        timeout 20m terraform apply -auto-approve tfplan
    - name: Terraform Apply Cloudflare
      working-directory: ./terraform_cf
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        set -euo pipefail
        timeout 5m terraform init
        timeout 10m terraform plan -out=tfplan -var-file=prod.tfvars
        timeout 20m terraform apply -auto-approve tfplan
    - name: Output Service URL
      working-directory: ./terraform_gcp_app
      run: |
        echo "✅ デプロイが完了しました！"
        echo "🌐 サービスURL: $(terraform output -raw cloud_run_url)"
