name: Deploy to Main

env:
  PROJECT_ID: duxca-298210
  PROJECT_NUMBER: 93254674393
  POOL_ID: githubaction
  PROVIDER_ID: github
  SERVICE_ACCOUNT: github-action-river@duxca-298210.iam.gserviceaccount.com
  NAME: asia-northeast1-docker.pkg.dev/duxca-298210/cloud-run-source-deploy/litestream-sandbox:latest
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

on:
  push:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: cargo test

  deploy:
    needs: [ test ]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.POOL_ID }}/providers/${{ env.PROVIDER_ID }}
        project_id: ${{ env.PROJECT_ID }}
        service_account: ${{ env.SERVICE_ACCOUNT }}
    - uses: google-github-actions/setup-gcloud@v2
    - run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev
    - run: |
        docker build . --tag=${{ env.NAME }}
        docker push ${{ env.NAME }}
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.2
    - name: Terraform Init and Apply
      working-directory: ./terraform
      run: |
        terraform init
        terraform plan
        terraform apply -auto-approve
    - name: Output Service URL
      working-directory: ./terraform
      run: |
        echo "✅ デプロイが完了しました！"
        echo "🌐 サービスURL: $(terraform output -raw cloud_run_url)"
