name: Claude Review - Specific Authors

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review-by-author:
    # Only run for PRs from specific authors
    if: |
      github.event.pull_request.user.login == 'legokichi'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Review PR from Specific Author
        uses: grll/claude-code-action@beta
        with:
          use_oauth: true
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
          model: claude-sonnet-4-20250514
          timeout_minutes: "60"
          mcp_config: |
            {
              "mcpServers": {
                "brave-search": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "BRAVE_API_KEY",
                    "mcp/brave-search"
                  ],
                  "env": {
                    "BRAVE_API_KEY": "${{ secrets.BRAVE_API_KEY }}"
                  },
                  "alwaysAllow": [
                    "brave_web_search"
                  ]
                },
                "fetch": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "mcp/fetch"
                  ],
                  "alwaysAllow": [
                    "fetch"
                  ]
                },
                "sequentialthinking": {
                  "command": "docker",
                  "args": [
                    "run",
                    "--rm",
                    "-i",
                    "mcp/sequentialthinking"
                  ]
                }
              }
            }
          allowed_tools: "mcp__sequential-thinking__sequentialthinking,mcp__brave-search__brave_web_search,mcp__brave-search__brave_local_search,mcp__fetch__fetch"
          direct_prompt: |
            Please provide a thorough review of this pull request.

            Since this is from a specific author that requires careful review,
            please pay extra attention to:
            - Adherence to project coding standards
            - Proper error handling
            - Security best practices
            - Test coverage
            - Documentation

            Provide detailed feedback and suggestions for improvement.
