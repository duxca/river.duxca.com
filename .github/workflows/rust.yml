name: Rust

env:
  PROJECT_ID: duxca-298210
  PROJECT_NUMBER: 93254674393
  POOL_ID: githubaction
  PROVIDER_ID: github
  PROVIDER_NAME: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.POOL_ID }}/providers/${{ env.PROVIDER_ID }}
  NAME: asia-northeast1-docker.pkg.dev/duxca-298210/cloud-run-source-deploy/litestream-sandbox:latest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  fmt:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - uses: Swatinem/rust-cache@v2
    - run: cargo install cargo-tomlfmt
    - run: cargo fmt --all -- --check
    - run: find . -name Cargo.toml -execdir cargo tomlfmt -d \;

  clippy:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - run: cargo clippy --all-targets --all-features -- -Dwarnings

  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - run: cargo test

  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - run: cargo install cross --git https://github.com/cross-rs/cross
    - run: CROSS_NO_WARNINGS=0 make all

  deploy:
    if: ${{ github.ref == 'refs/heads/main' || github.base_ref == 'main' }}
    needs: [ fmt, clippy, test ]
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: "google-github-actions/auth@v2"
      with:
        workload_identity_provider: ${{ env.PROVIDER_NAME }}
        project_id: ${{ env.PROJECT_ID }}
    - uses: google-github-actions/setup-gcloud@v2
    - run: gcloud auth configure-docker
    - run: |
        docker build . --tag=${{ env.NAME }}
        docker push ${{ env.NAME }}
    - uses: google-github-actions/deploy-cloudrun@v2
      with:
        metadata: assets/metadata.yaml
