name: Check Code

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  fmt:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - uses: Swatinem/rust-cache@v2
    - run: cargo install cargo-tomlfmt
    - run: cargo fmt --all -- --check
    - run: find . -name Cargo.toml -execdir cargo tomlfmt -d \;

  clippy:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
    - run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - run: cargo clippy --all-targets --all-features -- -Dwarnings

  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - run: sudo apt-get update && sudo apt-get install -y libudev-dev google-chrome-stable
    - run: cargo test
    - name: Verify server login integration tests
      run: cargo test -p server --test login_integration_test --verbose

#  build:
#    runs-on: ubuntu-24.04
#    steps:
#    - uses: actions/checkout@v4
#    - uses: dtolnay/rust-toolchain@stable
#    - uses: Swatinem/rust-cache@v2
#    - run: sudo apt-get update && sudo apt-get install -y libudev-dev
#    - run: cargo build --workspace

  terraform-plan:
    if: |
      github.event.pull_request.user.login == 'legokichi'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      PROJECT_ID: duxca-298210
      PROJECT_NUMBER: 93254674393
      POOL_ID: githubaction
      PROVIDER_ID: github
      SERVICE_ACCOUNT: github-action-river@duxca-298210.iam.gserviceaccount.com
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.POOL_ID }}/providers/${{ env.PROVIDER_ID }}
          project_id: ${{ env.PROJECT_ID }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Use gcloud CLI
        run: gcloud info
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate
      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check
      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./terraform/plan.txt', 'utf8');
            
            const output = `
            ## Terraform Plan Results
            
            <details>
            <summary>Terraform Plan Output</summary>
            
            \`\`\`
            ${plan}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
