name: Check Code

env:
  CARGO_TERM_COLOR: always
  RUST_CACHE_SHARED_KEY: rust-1.96.0

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.changes.outputs.rust }}
      runtime: ${{ steps.changes.outputs.runtime }}
    steps:
    - uses: actions/checkout@v6
    - uses: dorny/paths-filter@v4
      id: changes
      with:
        filters: |
          rust:
            - '**/*.rs'
            - '**/Cargo.toml'
            - '**/Cargo.lock'
            - '.github/workflows/**'
            - 'Makefile'
            - 'cli/**'
            - 'rust-toolchain.toml'
          runtime:
            - '**/*.rs'
            - '**/Cargo.toml'
            - '**/Cargo.lock'
            - 'Dockerfile'
            - '.dockerignore'
            - 'db/litestream'
            - 'db/litestream.yml'
            - 'cli/run.bash'
            - 'leptos-browser/**'
            - 'server/**'
            - 'shared-api/**'
            - 'service/**'
            - 'model/**'
            - 'db/**'

  fmt:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@1.96.0
      with:
        components: rustfmt
    - uses: cargo-bins/cargo-binstall@v1.20.0
    - run: cargo binstall -y --force cargo-tomlfmt
    - run: cargo fmt --all -- --check
    - run: |
        set -euo pipefail
        find . -name Cargo.toml.new -delete
        trap 'find . -name Cargo.toml.new -delete' EXIT
        find . -name Cargo.toml -print0 | while IFS= read -r -d '' manifest; do
          (cd "$(dirname "$manifest")" && cargo tomlfmt -d)
        done

  clippy:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@1.96.0
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
    - uses: cargo-bins/cargo-binstall@v1.20.0
    - name: Install sqlx-cli
      run: |
        cargo sqlx --version >/dev/null 2>&1 || cargo binstall -y sqlx-cli@0.8.6
        cargo sqlx --version
    - run: make clippy

  test:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@1.96.0
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
    - uses: cargo-bins/cargo-binstall@v1.20.0
    - name: Install sqlx-cli
      run: |
        cargo sqlx --version >/dev/null 2>&1 || cargo binstall -y sqlx-cli@0.8.6
        cargo sqlx --version
    - run: make test

  e2e-tests:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@1.96.0
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ env.RUST_CACHE_SHARED_KEY }}
    - uses: cargo-bins/cargo-binstall@v1.20.0
    - name: Install cargo-leptos and sqlx-cli
      run: |
        cargo leptos --version >/dev/null 2>&1 || cargo binstall -y cargo-leptos@0.3.6
        cargo sqlx --version >/dev/null 2>&1 || cargo binstall -y sqlx-cli@0.8.6
        cargo leptos --version
        cargo sqlx --version
    - name: Run browser scenario tests
      run: make test-e2e

  runtime-image:
    needs: changes
    if: ${{ needs.changes.outputs.runtime == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v6
    - uses: docker/setup-buildx-action@v4
    - name: Build runtime image
      uses: docker/build-push-action@v7
      with:
        context: .
        load: true
        tags: river-runtime-smoke:pr
        cache-from: type=gha,scope=runtime-image
        cache-to: type=gha,mode=max,scope=runtime-image
    - name: Smoke test runtime image
      run: |
        set -euo pipefail
        docker run --rm --entrypoint ldd river-runtime-smoke:pr /app/server
    - name: Smoke test runtime server boot
      run: |
        set -euo pipefail
        container_id="$(
          docker run -d --rm --entrypoint /app/server \
            -e HOST_ADDR=0.0.0.0:8080 \
            -e DATABASE_URL='sqlite::memory:' \
            -e BASE_URL='http://127.0.0.1:18080' \
            -e LOCAL_CLIENT_ID=local \
            -e LOCAL_CLIENT_SECRET=local \
            -e LOCAL_BASE_URL='http://127.0.0.1:18080' \
            -e GITHUB_CLIENT_ID=dummy \
            -e GITHUB_CLIENT_SECRET=dummy \
            -e FACEBOOK_CLIENT_ID=dummy \
            -e FACEBOOK_CLIENT_SECRET=dummy \
            -e LEPTOS_SITE_ROOT=target/site \
            -e LEPTOS_SITE_PKG_DIR=pkg \
            -p 18080:8080 \
            river-runtime-smoke:pr
        )"
        trap 'docker logs "$container_id"; docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
        for _ in {1..30}; do
          curl -fsS http://127.0.0.1:18080/ >/dev/null && exit 0
          sleep 1
        done
        exit 1

  terraform-plan:
    if: |
      github.event.pull_request.user.login == 'legokichi' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    env:
      PROJECT_ID: duxca-298210
      PROJECT_NUMBER: 93254674393
      POOL_ID: githubaction
      PROVIDER_ID: github
      SERVICE_ACCOUNT: github-action-river@duxca-298210.iam.gserviceaccount.com
      REGION: asia-northeast1
      SERVICE_NAME: litestream-sandbox
    steps:
      - uses: actions/checkout@v6
      - name: Debug Authentication Context
        run: |
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
          echo "PR User: ${{ github.event.pull_request.user.login }}"
          echo "Ref: ${{ github.ref }}"
          echo "Head Ref: ${{ github.head_ref }}"
          echo "Repository Owner: ${{ github.repository_owner }}"
          echo "Repository ID: ${{ github.repository_id }}"
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.POOL_ID }}/providers/${{ env.PROVIDER_ID }}
          project_id: ${{ env.PROJECT_ID }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
      - name: Use gcloud CLI
        run: gcloud info
      - name: Resolve current deployed image
        id: current_image
        run: |
          set -euo pipefail
          container_image="$(gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --format='value(spec.template.spec.containers[0].image)')"
          test -n "${container_image}"
          echo "container_image=${container_image}" >> "${GITHUB_OUTPUT}"
          echo "Current image: ${container_image}"
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.5
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: ./terraform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform init
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate
      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check
      - name: Terraform Plan
        working-directory: ./terraform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CONTAINER_IMAGE: ${{ steps.current_image.outputs.container_image }}
        run: |
          terraform plan -no-color -out=tfplan -var="container_image=${CONTAINER_IMAGE}"
          terraform show -no-color tfplan > plan.txt
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./terraform/plan.txt', 'utf8');
            
            const output = `
            ## Terraform Plan Results
            
            <details>
            <summary>Terraform Plan Output</summary>
            
            \`\`\`
            ${plan}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
