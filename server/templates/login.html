<!DOCTYPE html>
<html>
    <head>
        <title>ログイン</title>
    </head>
    <body>
        <h1>ログイン</h1>
        {% if let Some(auth) = github %}
        <div>github: {{ auth.identifier }}</div>
        {% else %}
        <form method="post" action="/login/github">
            <input type="submit" value="GitHub Login" />
        </form>
        {% endif %}
        {% if let Some(auth) = facebook %}
        <div>facebook: {{ auth.identifier }}</div>
        {% else %}
        <form method="post" action="/login/facebook">
            <input type="submit" value="Facebook Login" />
        </form>
        {% endif %}
        {% if let Some(auth) = twitter %}
        <div>twitter: {{ auth.identifier }}</div>
        {% else %}
        <form method="post" action="/login/twitter">
            <input type="submit" value="twitter Login" />
        </form>
        {% endif %}
    </body>
</html>
